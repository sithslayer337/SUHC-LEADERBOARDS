<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUHC Leaderboards — All Time</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
 
  <header>
    <div class="header-inner">
      <div class="logo">
        <img src="icons/logo_2.png" alt="SUHC" class="header-logo-img" onerror="this.style.display='none'" />
      </div>
      <div class="header-title">
        <h1>All Time Leaderboard</h1>
        <p class="subtitle">Tracking the legends of Survival UHC</p>
      </div>
      <div class="header-right">
        <img src="icons/logo.png" alt="SUHC Logo" class="site-logo" onerror="this.style.display='none'" />
        <div class="header-stats">
          <div class="hstat">
            <span class="hstat-num" id="total-players">0</span>
            <span class="hstat-label">Players</span>
          </div>
          <div class="hstat">
            <span class="hstat-num" id="total-points-sum">0</span>
            <span class="hstat-label">Points Earned</span>
          </div>
        </div>
      </div>
    </div>
  </header>
 
  <main>
    <div class="controls">
      <div class="sort-tabs">
        <button class="sort-btn active" data-sort="total">Total</button>
        <button class="sort-btn" data-sort="civ">CIV</button>
        <button class="sort-btn" data-sort="hg">HG</button>
        <button class="sort-btn" data-sort="uhc">UHC</button>
      </div>
    </div>
 
    <div class="rank-legend" id="rank-legend"></div>
 
    <div class="board" id="board">
      <div class="board-header">
        <span class="col-rank">#</span>
        <span class="col-name">Player</span>
        <span class="col-stat">CIV</span>
        <span class="col-stat">HG</span>
        <span class="col-stat">UHC</span>
        <span class="col-total">Total</span>
      </div>
      <div id="rows"></div>
    </div>
 
    <div class="empty-state" id="empty-state" style="display:none">
      <div class="empty-icon">⚔</div>
      <p>No players yet.</p>
    </div>
  </main>
 
  <!-- Player Detail Modal -->
  <div class="modal-overlay" id="detail-overlay">
    <div class="modal" id="detail-modal">
      <button class="modal-close" id="detail-close">✕</button>
      <div class="modal-avatar" id="detail-avatar"></div>
      <div class="modal-name" id="detail-name"></div>
      <div class="modal-rank-row">
        <img id="detail-tier-icon" class="tier-icon-md" src="" alt="" />
        <div class="modal-rank" id="detail-rank"></div>
      </div>
      <div class="modal-position" id="detail-position"></div>
      <div class="modal-total" id="detail-total"></div>
 
      <div class="stat-bars">
        <div class="stat-row">
          <span class="stat-label civ-color">CIV</span>
          <div class="bar-track"><div class="bar-fill civ-fill" id="bar-civ"></div></div>
          <span class="stat-val" id="val-civ"></span>
        </div>
        <div class="stat-row">
          <span class="stat-label hg-color">HG</span>
          <div class="bar-track"><div class="bar-fill hg-fill" id="bar-hg"></div></div>
          <span class="stat-val" id="val-hg"></span>
        </div>
        <div class="stat-row">
          <span class="stat-label uhc-color">UHC</span>
          <div class="bar-track"><div class="bar-fill uhc-fill" id="bar-uhc"></div></div>
          <span class="stat-val" id="val-uhc"></span>
        </div>
      </div>
 
      <div class="modal-badges" id="modal-badges"></div>
    </div>
  </div>
 
  <script src="players.js"></script>
  <script src="script.js"></script>
</body>
</html>
